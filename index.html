<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>ShopMe | Premium Fashion & Electronics</title>
    <meta name="title" content="ShopMe | Premium Fashion & Electronics" />
    <meta name="description" content="Discover the latest trends in Men's and Women's fashion, electronics, and accessories. Shop the best deals with ShopMe." />
    <meta name="theme-color" content="#fea928" />

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  </body>
